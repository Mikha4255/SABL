<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ошибка 404 — SABL2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a0c03;
            color: #ebdecc;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: radial-gradient(50% 54950% at 50% -0.01%, #ff6600 0%, #1d1102 100%);
            z-index: 10;
        }

        .error-container {
            max-width: 800px;
            padding: 40px;
            background: rgba(26, 12, 3, 0.7);
            border: 3px solid #ff6600;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .error-code {
            font-size: 120px;
            color: #ff4d00;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 77, 0, 0.5);
            font-weight: bold;
        }

        h1 {
            font-size: 42px;
            color: #ffa023;
            margin-bottom: 20px;
            font-family: "DM Serif Text", serif;
        }

        p {
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #f1d26c;
        }

        .sabl-logo {
            width: 120px;
            margin: 20px auto;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #ff6600;
            color: #1a0c03;
            text-decoration: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 2px solid #ff4800;
        }

        .btn:hover {
            background: #e16200;
            transform: scale(1.05);
            color: #ebdecc;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 16px;
            color: #af4c4c;
        }

        @media (max-width: 600px) {
            .error-code {
                font-size: 80px;
            }
            h1 {
                font-size: 32px;
            }
            p {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1>Страница исчезла в завозе!</h1>
        <p>
            Похоже, ты попал в параллельную вселенную SABL, где этой страницы не существует.<br>
            Возможно, она просто забыла, где лежит.
        </p>
        <a href="https://mikha4255.github.io/SABL/" class="btn">Вернуться на главную</a>
        <div class="footer-note">
            «Strange Academics of Biology and Literature» - 2026
        </div>
    </div>
</body>
</html>
